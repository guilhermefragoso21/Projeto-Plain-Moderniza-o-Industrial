<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLAIN — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar__logo">
      <div class="navbar__logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="navbar__logo-text">
        <span class="navbar__logo-name">PLAIN</span>
        <span class="navbar__logo-sub">Modernização Industrial</span>
      </div>
    </div>

    <ul class="navbar__links">
      <li><a href="#">Início</a></li>
      <li><a href="#">Quem somos</a></li>
      <li><a href="#">Contato</a></li>
    </ul>

    <button class="navbar__lang">
      <span>🇧🇷</span> PT <span class="chevron">▾</span>
    </button>
  </nav>

  <!-- HERO BACKGROUND -->
  <main class="hero">
    <div class="hero__grid"></div>

    <div class="hero__text">
      <h1 class="hero__title">Soluções em<br>Automação Industrial</h1>
      <p class="hero__subtitle">Conecte-se à plataforma PLAIN</p>
    </div>

    <!-- LOGIN CARD -->
    <div class="card" id="loginCard">
      <h2 class="card__title">Entrar na plataforma</h2>

      <!-- TABS -->
      <div class="card__tabs">
        <button class="tab tab--active" data-tab="empresa">Empresa</button>
        <button class="tab" data-tab="pessoal">Pessoal</button>
      </div>

      <!-- FORM -->
      <form class="form" id="loginForm" novalidate>
        <p class="form__section-label">Dados de acesso</p>

        <div class="form__group" id="cnpjGroup">
          <input
            type="text"
            id="cnpj"
            class="form__input"
            placeholder="CNPJ da empresa"
            maxlength="18"
          />
          <span class="form__error" id="cnpjError"></span>
        </div>

        <div class="form__group">
          <input
            type="email"
            id="email"
            class="form__input"
            placeholder="E-mail corporativo"
          />
          <span class="form__error" id="emailError"></span>
        </div>

        <div class="form__group form__group--password">
          <input
            type="password"
            id="password"
            class="form__input"
            placeholder="Senha"
          />
          <button type="button" class="form__eye" id="togglePassword" aria-label="Mostrar senha">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
          <span class="form__error" id="passwordError"></span>
        </div>

        <div class="form__forgot">
          <a href="#" class="form__forgot-link">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-primary__text">Entrar</span>
          <span class="btn-primary__spinner" id="spinner" hidden></span>
        </button>
      </form>

      <div class="divider">
        <span></span><p>ou acesse com</p><span></span>
      </div>

      <div class="social-btns">
        <button class="btn-social" id="googleBtn">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="#EA4335" d="M5.27 9.77A7.01 7.01 0 0112 5c1.69 0 3.22.6 4.41 1.59l3.3-3.3A11.95 11.95 0 0012 0C7.03 0 2.73 3.14.96 7.73l4.31 2.04z"/><path fill="#34A853" d="M16.04 18.01A7.01 7.01 0 0112 19c-2.95 0-5.48-1.83-6.6-4.44l-4.32 2.01C3.05 20.95 7.22 24 12 24c3.23 0 6.17-1.19 8.4-3.14l-4.36-2.85z"/><path fill="#4A90D9" d="M20.4 20.86C22.63 18.7 24 15.53 24 12c0-.83-.1-1.63-.24-2.41H12v4.82h6.74c-.35 1.55-1.22 2.82-2.47 3.67l4.13 2.78z"/><path fill="#FBBC05" d="M5.4 14.56A7.04 7.04 0 015 12c0-.9.16-1.77.4-2.6L1.1 7.36A11.96 11.96 0 000 12c0 1.9.44 3.7 1.22 5.31l4.18-2.75z"/></svg>
          Google
        </button>
        <button class="btn-social" id="msBtn">
          <svg viewBox="0 0 24 24" width="16" height="16"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="13" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="13" width="10" height="10" fill="#00A4EF"/><rect x="13" y="13" width="10" height="10" fill="#FFB900"/></svg>
          Microsoft
        </button>
      </div>

      <p class="signup">Não tem conta? <a href="#">Solicite acesso</a></p>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast" role="alert"></div>

  <script src="script.js"></script>
</body>
</html>
